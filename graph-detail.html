    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/esp32.js"></script>
    <script>
        // Get metric from URL parameter
        const urlParams = new URLSearchParams(window.location.search);
        const metric = urlParams.get('metric') || 'voltage';
        
        const metricConfig = {
            voltage: { title: 'Voltage', unit: 'V', color: '#f59e0b' },
            current: { title: 'Current', unit: 'A', color: '#3b82f6' },
            power: { title: 'Power', unit: 'W', color: '#10b981' },
            intensity: { title: 'Solar Intensity', unit: 'W/m²', color: '#f59e0b' }
        };
        
        const config = metricConfig[metric];
        
        // Update page title
        document.getElementById('metricTitle').textContent = config.title + ' Detail';
        document.getElementById('currentUnit').textContent = config.unit;
        document.getElementById('maxUnit').textContent = config.unit;
        document.getElementById('minUnit').textContent = config.unit;
        document.getElementById('avgUnit').textContent = config.unit;
        
        // Initialize chart
        let detailChart = null;
        let values = [];
        
        function initChart() {
            const ctx = document.getElementById('detailChart').getContext('2d');
            
            detailChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: config.title,
                        data: [],
                        borderColor: config.color,
                        backgroundColor: config.color + '20',
                        borderWidth: 3,
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        },
                        tooltip: {
                            backgroundColor: 'rgba(0, 0, 0, 0.8)',
                            padding: 12
                        }
                    },
                    scales: {
                        x: {
                            display: true,
                            grid: {
                                color: 'rgba(148, 163, 184, 0.1)'
                            }
                        },
                        y: {
                            display: true,
                            grid: {
                                color: 'rgba(148, 163, 184, 0.1)'
                            }
                        }
                    }
                }
            });
            
            // Subscribe to data updates
            window.esp32Manager.start();
            window.esp32Manager.subscribe((data, changes) => {
                updateChart(data);
            });
        }
        
        function updateChart(data) {
            const value = metric === 'intensity' ? Math.round(data[metric]) : data[metric];
            const timeLabel = new Date().toLocaleTimeString();
            
            // Update current value
            document.getElementById('currentValue').textContent = 
                metric === 'intensity' ? value : value.toFixed(2);
            
            // Add to values array
            values.push(value);
            if (values.length > 60) values.shift();
            
            // Update statistics
            if (values.length > 0) {
                const max = Math.max(...values);
                const min = Math.min(...values);
                const avg = values.reduce((a, b) => a + b, 0) / values.length;
                
                document.getElementById('maxValue').textContent = 
                    metric === 'intensity' ? Math.round(max) : max.toFixed(2);
                document.getElementById('minValue').textContent = 
                    metric === 'intensity' ? Math.round(min) : min.toFixed(2);
                document.getElementById('avgValue').textContent = 
                    metric === 'intensity' ? Math.round(avg) : avg.toFixed(2);
            }
            
            // Update chart
            detailChart.data.labels.push(timeLabel);
            detailChart.data.datasets[0].data.push(value);
            
            if (detailChart.data.labels.length > 60) {
                detailChart.data.labels.shift();
                detailChart.data.datasets[0].data.shift();
            }
            
            detailChart.update('none');
        }
        
        document.addEventListener('DOMContentLoaded', initChart);
    </script>
    <script src="js/script.js"></script>
